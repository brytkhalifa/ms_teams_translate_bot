<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Translate &amp; Chat</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #eef1f8;
        --surface: #ffffff;
        --surface-muted: #f3f5fa;
        --text: #1f2937;
        --subtle: #6b7280;
        --border: #d8dde6;
        --primary: #6264a7;
        --primary-hover: #5558a0;
        --danger: #b00020;
        --badge-deepl: #0d9488;
        --badge-chat: #7c3aed;
      }
      * { box-sizing: border-box; }
      body {
        font-family: Segoe UI, Arial, sans-serif;
        margin: 0;
        padding: 10px;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
      }
      .wrap {
        max-width: 920px;
        margin: 0 auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        display: flex;
        flex-direction: column;
        height: calc(100vh - 20px);
        overflow: hidden;
      }
      .header {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--surface-muted);
      }
      h2 { margin: 0; font-size: 18px; }
      .subtitle { margin: 4px 0 0; color: var(--subtle); font-size: 13px; }
      .modeRow {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }
      .modeRow label { margin: 0; font-weight: 600; font-size: 13px; }
      .modeRow select {
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: inherit;
        font-size: 14px;
        min-width: 160px;
      }
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 14px 16px;
        scroll-behavior: smooth;
      }
      .queueTitle { display: block; margin: 0 0 8px; font-weight: 600; color: var(--subtle); }
      .queueEmpty {
        border: 1px dashed var(--border);
        border-radius: 10px;
        padding: 16px;
        color: var(--subtle);
        font-size: 14px;
        background: var(--surface-muted);
      }
      .composer {
        border-top: 1px solid var(--border);
        padding: 12px 16px;
        background: var(--surface);
      }
      .controls {
        display: grid;
        grid-template-columns: 220px auto;
        gap: 10px;
        align-items: end;
      }
      .controls.hiddenLang {
        grid-template-columns: 1fr;
      }
      label.fieldLabel { display: block; margin: 8px 0 6px; font-weight: 600; font-size: 13px; }
      select, textarea, button { width: 100%; font-size: 14px; }
      select, textarea {
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: inherit;
      }
      textarea { min-height: 90px; max-height: 180px; resize: vertical; }
      button {
        margin-top: 0;
        padding: 10px 12px;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        background: var(--primary);
        color: #fff;
        font-weight: 600;
      }
      button:hover { background: var(--primary-hover); }
      .result {
        margin-top: 6px;
        white-space: pre-wrap;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        background: var(--surface-muted);
      }
      .queueList { margin-top: 10px; display: grid; gap: 10px; }
      .queueItem {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        background: #fff;
      }
      .queueItem[data-kind="chat"] {
        border-left: 4px solid var(--badge-chat);
      }
      .queueItem[data-kind="deepl"] {
        border-left: 4px solid var(--badge-deepl);
      }
      .queueHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
        gap: 10px;
        flex-wrap: wrap;
      }
      .queueMeta {
        font-size: 12px;
        color: var(--subtle);
        overflow-wrap: anywhere;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .kindBadge {
        display: inline-block;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        padding: 2px 8px;
        border-radius: 999px;
        color: #fff;
      }
      .kindBadge.deepl { background: var(--badge-deepl); }
      .kindBadge.chat { background: var(--badge-chat); }
      .bubbleRow {
        display: flex;
        margin-top: 6px;
      }
      .bubbleRow.user { justify-content: flex-end; }
      .bubbleRow.bot { justify-content: flex-start; }
      .bubble {
        max-width: 78%;
        border-radius: 12px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .bubble.user {
        background: #e8edff;
        border-color: #cfd7ff;
      }
      .bubble.bot {
        background: var(--surface-muted);
      }
      .copyButton {
        width: auto;
        margin: 0;
        padding: 6px 8px;
        font-size: 14px;
        line-height: 1;
        border-radius: 6px;
        background: transparent;
        color: var(--subtle);
        border: 1px solid var(--border);
      }
      .copyButton:hover { color: var(--primary); border-color: var(--primary); }
      .error { color: var(--danger); margin-top: 8px; min-height: 1em; font-size: 13px; }
      .visuallyHidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      @media (max-width: 680px) {
        .controls { grid-template-columns: 1fr; }
        .wrap { height: 100vh; border-radius: 0; margin: 0; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <h2>Translate &amp; Chat</h2>
        <p class="subtitle">DeepL translation or ChatGPT. Ctrl+Enter sends.</p>
        <div class="modeRow">
          <label for="appMode">Mode</label>
          <select id="appMode" name="appMode" aria-describedby="modeHelp">
            <option value="translate">Translate (DeepL)</option>
            <option value="chat">Chat (ChatGPT)</option>
          </select>
          <span id="modeHelp" class="visuallyHidden">Choose translation or chat. Chat uses prior chat messages only as context.</span>
        </div>
      </div>

      <div class="messages">
        <label class="queueTitle" for="threadQueue">Conversation</label>
        <div id="threadQueue" class="queueList">
          <div id="queueEmpty" class="queueEmpty">No messages yet.</div>
        </div>
      </div>

      <form id="mainForm" class="composer">
        <label class="fieldLabel" for="sourceText">Message</label>
        <textarea id="sourceText" name="sourceText" placeholder="Type a message..."></textarea>

        <div id="controlsRow" class="controls">
          <div id="langBlock">
            <label class="fieldLabel" for="targetLanguage">Target language</label>
            <select id="targetLanguage" name="targetLanguage">
              <option value="EN-US">English (US)</option>
              <option value="EN-GB">English (UK)</option>
              <option value="DE">German</option>
              <option value="ES">Spanish</option>
              <option value="FR">French</option>
              <option value="IT">Italian</option>
              <option value="NL">Dutch</option>
              <option value="PT-PT">Portuguese (Portugal)</option>
              <option value="PT-BR">Portuguese (Brazil)</option>
              <option value="PL">Polish</option>
              <option value="JA">Japanese</option>
              <option value="ZH-HANS">Chinese (Simplified)</option>
              <option value="ZH-HANT">Chinese (Traditional)</option>
            </select>
          </div>
          <button type="submit" title="Send message (Ctrl+Enter or ⌘+Enter)" aria-label="Send message. Shortcut: Control plus Enter or Command plus Enter on Mac">Send</button>
        </div>
        <div id="error" class="error"></div>
      </form>
    </div>

    <script>
      const form = document.getElementById('mainForm');
      const appMode = document.getElementById('appMode');
      const targetLanguage = document.getElementById('targetLanguage');
      const langBlock = document.getElementById('langBlock');
      const controlsRow = document.getElementById('controlsRow');
      const sourceText = document.getElementById('sourceText');
      const threadQueue = document.getElementById('threadQueue');
      const queueEmpty = document.getElementById('queueEmpty');
      const error = document.getElementById('error');

      /** @type {{ role: 'user' | 'assistant', content: string }[]} */
      let chatThread = [];

      async function copyToClipboard(value) {
        if (!navigator.clipboard || !navigator.clipboard.writeText) {
          throw new Error('Clipboard API is not available.');
        }
        await navigator.clipboard.writeText(value);
      }

      function scrollMessagesToBottom() {
        const messages = document.querySelector('.messages');
        if (messages) {
          messages.scrollTop = messages.scrollHeight;
        }
      }

      function updateModeUI() {
        const isChat = appMode.value === 'chat';
        langBlock.style.display = isChat ? 'none' : '';
        controlsRow.classList.toggle('hiddenLang', isChat);
      }

      appMode.addEventListener('change', updateModeUI);
      updateModeUI();

      /**
       * @param {object} opts
       * @param {'deepl' | 'chat'} opts.kind
       * @param {string} opts.userText
       * @param {string} opts.botText - translation or assistant reply
       * @param {string} opts.metaLabel - e.g. "EN -> DE" or "ChatGPT"
       */
      function appendThreadItem({ kind, userText, botText, metaLabel }) {
        if (queueEmpty) {
          queueEmpty.style.display = 'none';
        }

        const item = document.createElement('div');
        item.className = 'queueItem';
        item.setAttribute('data-kind', kind);

        const header = document.createElement('div');
        header.className = 'queueHeader';

        const meta = document.createElement('div');
        meta.className = 'queueMeta';

        const badge = document.createElement('span');
        badge.className = 'kindBadge ' + (kind === 'deepl' ? 'deepl' : 'chat');
        badge.textContent = kind === 'deepl' ? 'DeepL' : 'ChatGPT';

        const metaText = document.createElement('span');
        metaText.textContent = metaLabel;

        meta.appendChild(badge);
        meta.appendChild(metaText);

        const copyButton = document.createElement('button');
        copyButton.type = 'button';
        copyButton.className = 'copyButton';
        copyButton.setAttribute('aria-label', 'Copy assistant reply');
        copyButton.title = 'Copy assistant reply';
        copyButton.textContent = '📋';
        copyButton.addEventListener('click', async () => {
          try {
            await copyToClipboard(botText);
            copyButton.textContent = '✅';
            setTimeout(() => {
              copyButton.textContent = '📋';
            }, 1000);
          } catch {
            error.textContent = 'Copy failed. Please copy manually.';
          }
        });

        header.appendChild(meta);
        header.appendChild(copyButton);

        const body = document.createElement('div');
        body.className = 'result';
        body.style.marginTop = '0';

        const userRow = document.createElement('div');
        userRow.className = 'bubbleRow user';
        const userBubble = document.createElement('div');
        userBubble.className = 'bubble user';
        userBubble.textContent = userText;
        userRow.appendChild(userBubble);

        const botRow = document.createElement('div');
        botRow.className = 'bubbleRow bot';
        const botBubble = document.createElement('div');
        botBubble.className = 'bubble bot';
        botBubble.textContent = botText;
        botRow.appendChild(botBubble);

        body.appendChild(userRow);
        body.appendChild(botRow);

        item.appendChild(header);
        item.appendChild(body);
        threadQueue.appendChild(item);
        scrollMessagesToBottom();
      }

      sourceText.addEventListener('keydown', (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
          event.preventDefault();
          form.requestSubmit();
        }
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        error.textContent = '';

        const text = sourceText.value.trim();
        if (!text) {
          error.textContent =
            appMode.value === 'chat'
              ? 'Please enter a message.'
              : 'Please enter a message to translate.';
          return;
        }

        if (appMode.value === 'chat') {
          const outgoing = [...chatThread, { role: 'user', content: text }];
          try {
            const response = await fetch('/api/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ messages: outgoing }),
            });
            const payload = await response.json();
            if (!response.ok) {
              error.textContent = payload.error || 'Chat failed.';
              return;
            }
            const reply = payload.reply || '';
            appendThreadItem({
              kind: 'chat',
              userText: text,
              botText: reply,
              metaLabel: 'ChatGPT',
            });
            chatThread.push({ role: 'user', content: text });
            chatThread.push({ role: 'assistant', content: reply });
            sourceText.value = '';
            scrollMessagesToBottom();
          } catch (e) {
            error.textContent = `Chat failed: ${String(e)}`;
          }
          return;
        }

        const params = new URLSearchParams({
          text,
          targetLanguage: targetLanguage.value,
        });

        try {
          const response = await fetch(`/api/translate?${params.toString()}`);
          const payload = await response.json();
          if (!response.ok) {
            error.textContent = payload.error || 'Translation failed.';
            return;
          }

          const translatedText = payload.translatedText || '';
          const apiDetectedSourceLanguage = payload.detectedSourceLanguage || '';
          const apiTargetLanguage = payload.targetLanguage || '';
          const meta =
            apiDetectedSourceLanguage && apiTargetLanguage
              ? `${apiDetectedSourceLanguage} → ${apiTargetLanguage}`
              : apiTargetLanguage || 'DeepL';
          appendThreadItem({
            kind: 'deepl',
            userText: text,
            botText: translatedText,
            metaLabel: meta,
          });
          sourceText.value = '';
          scrollMessagesToBottom();
        } catch (e) {
          error.textContent = `Translation failed: ${String(e)}`;
        }
      });
    </script>
  </body>
</html>
